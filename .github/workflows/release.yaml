name: Release Charm

on:
  push:
    branches:
      - main
      - track/**

permissions:
  # Required for CodeQL security scanning
  security-events: write
  # Required for private repositories
  actions: read
  contents: read

jobs:
  release:
    uses: canonical/observability/.github/workflows/charm-release.yaml@v2
    secrets: inherit
    with:
      default-track: dev
